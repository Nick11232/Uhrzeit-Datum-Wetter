<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Feuerwehr Infodisplay</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

#wrapper{
width:355px;
height:100px;
padding:8px;
box-sizing:border-box;

background-image:url("https://i.ibb.co/Jj5VHVzY/Vorlage-Divera-Ticker-5.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#clock{
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px rgba(0,0,0,0.8);
}

#date{
font-size:13px;
margin-top:2px;
text-shadow:0 0 8px rgba(0,0,0,0.8);
}

#weather{
font-size:13px;
margin-top:2px;
text-shadow:0 0 8px rgba(0,0,0,0.8);
}

</style>
</head>

<body>

<div id="wrapper">

<div id="clock">00:00:00</div>
<div id="date"></div>
<div id="weather">Wetter lädt...</div>

</div>

<script>

function updateTime(){

const now = new Date();

const hours = String(now.getHours()).padStart(2,"0");
const minutes = String(now.getMinutes()).padStart(2,"0");
const seconds = String(now.getSeconds()).padStart(2,"0");

document.getElementById("clock").textContent =
`${hours}:${minutes}:${seconds}`;

const tage = ["So.","Mo.","Di.","Mi.","Do.","Fr.","Sa."];
const monate = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

const tag = tage[now.getDay()];
const day = String(now.getDate()).padStart(2,"0");
const monat = monate[now.getMonth()];
const jahr = now.getFullYear();

document.getElementById("date").textContent =
`${tag} ${day}. ${monat} ${jahr}`;

}

setInterval(updateTime,1000);
updateTime();

async function loadWeather(){

try{

const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=49.21&longitude=8.71&current_weather=true");
const data = await response.json();

const temp = data.current_weather.temperature;

document.getElementById("weather").textContent =
`🌤 ${temp}°C Östringen`;

}catch{

document.getElementById("weather").textContent =
"Wetter nicht verfügbar";

}

}

loadWeather();
setInterval(loadWeather,600000);

</script>

</body>
</html>
